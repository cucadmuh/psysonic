# Nix: pin Psychotoxical/psysonic via `inputs.upstream-src` + `nix/upstream-sources.json`, refresh
# `flake.lock` for that input only, verify `nix build .#psysonic` + upstream `tauri build --no-bundle`.
#
# Triggers:
#   • schedule — once per day; if latest GitHub Release tag == pinned tag in nix/upstream-sources.json,
#     the job exits without cloning, Nix, or commits.
#   • workflow_dispatch — optional tag; empty tag = same as latest release + skip-if-already-pinned.
#     Non-empty tag = always run (re-pin to that tag).
#
# Upstream clone: `upstream-src/` (gitignored).

name: Upstream tag — Nix verify + flake.lock

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Upstream tag (e.g. app-v1.34.11). Empty = latest release; same as pinned = no-op unless you need a full re-verify.'
        required: false
        type: string
  schedule:
    # ~06:15 UTC daily (avoid exact hour for GitHub load)
    - cron: '15 6 * * *'

concurrency:
  group: upstream-release-nix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-and-lock:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve tag and whether to update
        id: meta
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          LATEST="$(curl -fsSL https://api.github.com/repos/Psychotoxical/psysonic/releases/latest | jq -r '.tag_name')"
          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "Could not resolve latest release tag"
            exit 1
          fi

          PINNED="$(jq -er .tag nix/upstream-sources.json)"

          # Manual with explicit tag: always run the pin + verify pipeline.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${INPUT_TAG:-}" ]; then
            echo "Using workflow input tag: $INPUT_TAG"
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Latest release (schedule or manual with empty input)
          echo "Latest upstream release: $LATEST (pinned: $PINNED)"
          echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
          if [ "$PINNED" = "$LATEST" ]; then
            echo "Already pinned to latest — skipping build and lock."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "New release — will update pins and flake.lock (upstream-src only)."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Nix
        if: steps.meta.outputs.skip != 'true'
        uses: DeterminateSystems/nix-installer-action@v15

      - name: Clone upstream at release tag
        if: steps.meta.outputs.skip != 'true'
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "${{ steps.meta.outputs.tag }}" \
            https://github.com/Psychotoxical/psysonic.git upstream-src

      - name: Pin upstream-src (flake URL + nix/upstream-sources.json)
        if: steps.meta.outputs.skip != 'true'
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          ROOT="${GITHUB_WORKSPACE}"
          cd "$ROOT"
          REV="$(git -C upstream-src rev-parse HEAD)"
          VERSION="$(jq -r .version upstream-src/package.json)"
          NPM_HASH="$(nix run nixpkgs/nixos-unstable#prefetch-npm-deps -- "$ROOT/upstream-src/package-lock.json")"
          jq -n \
            --arg tag "$TAG" \
            --arg rev "$REV" \
            --arg version "$VERSION" \
            --arg npmDepsHash "$NPM_HASH" \
            '{tag: $tag, rev: $rev, version: $version, npmDepsHash: $npmDepsHash}' \
            > nix/upstream-sources.json
          perl -0pi -e 's/(upstream-src = \{\s*url = "github:Psychotoxical\/psysonic\/)[^"]+/${1}'"$TAG"'/s' flake.nix

      - name: Refresh flake.lock (upstream-src input only)
        if: steps.meta.outputs.skip != 'true'
        run: nix flake lock --update-input upstream-src

      - name: Verify Nix package (fork flake, upstream sources)
        if: steps.meta.outputs.skip != 'true'
        run: nix build .#psysonic --accept-flake-config --no-link --print-build-logs

      - name: Cache cargo (upstream src-tauri)
        if: steps.meta.outputs.skip != 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: upstream-src/src-tauri

      - name: Verify upstream builds (Tauri prod, no bundles)
        if: steps.meta.outputs.skip != 'true'
        env:
          VITE_LASTFM_API_KEY: ${{ secrets.VITE_LASTFM_API_KEY }}
          VITE_LASTFM_API_SECRET: ${{ secrets.VITE_LASTFM_API_SECRET }}
        run: |
          set -euo pipefail
          nix develop .#default --accept-flake-config -c bash -eo pipefail -c '
            cd upstream-src
            npm ci
            npm run tauri -- build --no-bundle
          '

      - name: Commit and push lock + pins if changed
        if: steps.meta.outputs.skip != 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.nix flake.lock nix/upstream-sources.json
          if git diff --cached --quiet; then
            echo "flake.nix / flake.lock / nix/upstream-sources.json unchanged"
            exit 0
          fi
          git commit -m "chore(nix): pin upstream ${{ steps.meta.outputs.tag }} (flake + npm)"
          git push origin "HEAD:${{ github.ref_name }}"
